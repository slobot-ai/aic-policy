[pytest]
# Import paths: package under test, sibling ``aic`` sources, and generated ``aic_*`` msgs in ``aic`` pixi env.
# Matches ``pixi run pytest`` (see ``pixi.toml``).
pythonpath =
    ros_ws/src/aic_policy_ros
    ../aic/aic_model
    ../aic/.pixi/envs/default/lib/python3.12/site-packages
testpaths = ros_ws/src/aic_policy_ros/tests
# ``lark`` (transitive via ``aic``) still imports ``sre_parse`` / ``sre_constants``; deprecated on Python 3.12.
filterwarnings =
    ignore:module 'sre_parse' is deprecated:DeprecationWarning:lark.utils
    ignore:module 'sre_constants' is deprecated:DeprecationWarning:lark.utils
